<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Alunos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn-novo { display: inline-block; margin-bottom: 20px; padding: 10px 15px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
<h2>Alunos Cadastrados</h2>
<a href="/alunos/novo" class="btn-novo">+ Cadastrar Novo Aluno</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Matrícula</th>
        <th>Turma</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${lista}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.nome}"></td>
        <td th:text="${a.matricula}"></td>
        <td th:text="${a.turma != null ? a.turma.nome : 'Sem turma'}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
