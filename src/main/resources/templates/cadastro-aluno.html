<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #f0f2f5; }
        form { display: flex; flex-direction: column; width: 350px; gap: 15px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<h2>Cadastrar Novo Aluno</h2>

<form th:action="@{/alunos/salvar}" method="post">
    <input type="text" name="nome" placeholder="Nome do Aluno" required>
    <input type="text" name="matricula" placeholder="Número da Matrícula" required>

    <label>Selecione a Turma:</label>
    <select name="turmaId" required>
        <option th:each="t : ${turmas}"
                th:value="${t.id}"
                th:text="${t.nome}"></option>
    </select>

    <button type="submit">Finalizar Cadastro</button>
</form>

</body>
</html>
