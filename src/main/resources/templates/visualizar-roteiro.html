<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabGuide - Detalhes do Roteiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">LabGuide</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/roteiros">Voltar para a Lista</a>
        </div>
    </div>
</nav>

<div class="container main-content mb-5">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="border-b pb-3 mb-4 border-bottom">
                        <span class="badge bg-primary px-3 py-2 rounded-pill mb-2" th:text="${roteiro.turma.nome}">Turma</span>
                        <h2 class="fw-bold text-dark" th:text="${roteiro.titulo}">Nome do Roteiro</h2>
                    </div>

                    <h5 class="fw-bold text-secondary mb-3">Contextualização do Experimento</h5>
                    <p class="text-muted lh-lg fs-5" style="white-space: pre-line;" th:text="${roteiro.descricao}">Descrição...</p>

                    <div class="mt-5 pt-4 border-top">
                        <a th:href="@{/roteiros/editar/{id}(id=${roteiro.id})}" class="btn btn-warning fw-bold px-4">Editar este Roteiro</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white pt-4 pb-2 border-top border-secondary mt-auto">
    <div class="container text-center">
        <small class="text-white-50">© 2026 LabGuide - Instituto Federal de Goiás (IFG) - Campus Luziânia</small>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
