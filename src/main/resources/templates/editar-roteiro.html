<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabGuide - Editar Roteiro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        body { display: flex; flex-direction: column; min-height: 100vh; }
        .main-content { flex: 1; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">LabGuide</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/alunos">Alunos</a>
            <a class="nav-link" href="/roteiros">Lista de Roteiros</a>
        </div>
    </div>
</nav>

<div class="container main-content mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4 text-center fw-bold text-secondary">Editar Roteiro de Química</h3>

                    <form th:action="@{/roteiros/salvar}" method="post">
                        <input type="hidden" name="id" th:value="${roteiro.id}">

                        <div class="mb-3">
                            <label for="titulo" class="form-label fw-semibold">Nome do Experimento</label>
                            <input type="text" class="form-control" id="titulo" name="titulo" th:value="${roteiro.titulo}" required>
                        </div>

                        <div class="mb-3">
                            <label for="turmaId" class="form-label fw-semibold">Turma Alvo</label>
                            <select class="form-select" id="turmaId" name="turmaId" required>
                                <option th:each="t : ${turmas}"
                                        th:value="${t.id}"
                                        th:text="${t.nome}"
                                        th:selected="${t.id == roteiro.turma.id}"></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="descricao" class="form-label fw-semibold">Descrição / Contextualização</label>
                            <textarea class="form-control" id="descricao" name="descricao" rows="4" th:text="${roteiro.descricao}" required></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-warning btn-lg rounded-3 fw-bold text-dark">Salvar Alterações</button>
                            <a href="/roteiros" class="btn btn-light rounded-3 fw-semibold">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white pt-4 pb-2 border-top border-secondary mt-auto">
    <div class="container text-center">
        <small class="text-white-50">© 2026 LabGuide - Instituto Federal de Goiás (IFG) - Campus Luziânia</small>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
