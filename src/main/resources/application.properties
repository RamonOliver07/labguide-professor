spring.application.name=labguide-professor

# 1. Conex„o (TENHA CERTEZA DA SENHA)
spring.datasource.url=jdbc:postgresql://localhost:5432/db_labguide
spring.datasource.username=postgres
spring.datasource.password=6243
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate -
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 3. Log extra para a gente ver o que est· acontecendo
logging.level.org.hibernate.orm.deprecation=error
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE