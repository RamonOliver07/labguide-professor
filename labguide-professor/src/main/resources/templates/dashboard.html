<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - LabGuide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card-resumo { border-left: 5px solid #007b7f; border-radius: 8px; }
        .grafico-container { max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4" style="background-color: #007b7f;">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">🧪 LabGuide</a>

        <div class="d-flex align-items-center">
            <a th:href="@{/roteiros}" class="btn btn-light btn-sm text-dark fw-bold me-3 shadow-sm">Meus Roteiros</a>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm fw-bold">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <h3 class="fw-bold mb-4 text-secondary">Visão Geral</h3>

    <div class="row mb-5">
        <div class="col-md-4">
            <div class="card card-resumo shadow-sm">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase mb-1">Total de Roteiros</h6>
                    <h2 class="mb-0 fw-bold" th:text="${totalRoteiros}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-resumo shadow-sm" style="border-left-color: #ffc107;">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase mb-1">Turmas Ativas</h6>
                    <h2 class="mb-0 fw-bold" th:text="${totalTurmas}">0</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card card-resumo shadow-sm" style="border-left-color: #198754;">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase mb-1">Alunos Cadastrados</h6>
                    <h2 class="mb-0 fw-bold" th:text="${totalAlunos}">0</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">
                    Engajamento Recente (Responderam vs Pendentes)
                </div>
                <div class="card-body grafico-container">
                    <canvas id="graficoEngajamento"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('graficoEngajamento');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Já Responderam', 'Pendentes'],
            datasets: [{
                data: [12, 5],
                backgroundColor: ['#198754', '#dc3545'],
                hoverOffset: 4
            }]
        },
        options: { responsive: true }
    });
</script>
</body>
</html>
