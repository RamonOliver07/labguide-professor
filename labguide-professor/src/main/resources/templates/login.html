<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LabGuide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
        }
        .login-sidebar {
            background-color: #007b7f; /* Cor oficial do LabGuide */
            color: white;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .login-form-area {
            padding: 3rem;
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card login-card mx-auto">
        <div class="row g-0">

            <div class="col-md-5 login-sidebar text-center d-none d-md-flex">
                <h1 class="fw-bold mb-3">🧪 LabGuide</h1>
                <p class="fs-5">Ferramenta de Apoio à Experimentação Investigativa em Química.</p>
                <div class="mt-4">
                    <span class="badge bg-light text-dark fs-6 px-3 py-2">Módulo do Professor</span>
                </div>
            </div>

            <div class="col-md-7 login-form-area">
                <h3 class="fw-bold text-dark mb-4">Acesse sua conta</h3>

                <div th:if="${param.error}" class="alert alert-danger shadow-sm">
                    ⚠️ Usuário ou senha incorretos. Tente novamente.
                </div>
                <div th:if="${param.logout}" class="alert alert-success shadow-sm">
                    ✅ Você saiu do sistema com segurança.
                </div>

                <form th:action="@{/login}" method="post">

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="username" name="username" placeholder="name@example.com" required>
                        <label for="username">E-mail institucional</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Senha" required>
                        <label for="password">Senha</label>
                    </div>

                    <button type="submit" class="btn btn-lg w-100 fw-bold text-white shadow-sm" style="background-color: #007b7f;">
                        Entrar no Sistema
                    </button>

                </form>

            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<footer class="fixed-bottom text-center py-3">
    <small class="text-muted fw-bold">
        &copy; 2026 Instituto Federal de Goiás (IFG) - Câmpus Luziânia. LabGuide.
    </small>
</footer>

</body>
</html>
